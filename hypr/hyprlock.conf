# ~/.config/hypr/hyprlock.conf

# General settings
general {
    disable_loading_bar = false
    grace = 5
    hide_cursor = false
}

# Background (wallpaper)
background {
    monitor =
    path = ~/.config/hypr/wallpapers/lock.png
    blur_passes = 1
    blur_size = 7
    noise = 0.011
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# Input field (password box)
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(ffffffaa)
    inner_color = rgba(111111ff)
    font_color = rgba(ffffffff)

    fade_on_empty = false
    placeholder_text = <i>Enter password...</i>

    hide_input = false
    position = 0, -100
    halign = center
    valign = center
}

# Clock label
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    font_family = JetBrains Mono

    color = rgba(ffffffff)
    position = 0, 150

    halign = center
    valign = center
}

# Date label
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    font_size = 22
    font_family = JetBrains Mono

    color = rgba(ccccccff)
    position = 0, 90

    halign = center
    valign = center
}