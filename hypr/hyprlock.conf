# ~/.config/hypr/hyprlock.conf

# General settings
general {
    disable_loading_bar = false
    grace = 5
    hide_cursor = false
}

# Background (wallpaper)
background {
    monitor =
    path =
    color = rgba(e8e8e8ff)
    blur_passes = 0
}

# Input field (password box)
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2

    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(60DD2Aff)
    inner_color = rgba(e8e8e8ff)
    font_color = rgba(0a0a0aff)

    fade_on_empty = false
    placeholder_text = <i>Enter password...</i>

    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}

# Clock label
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 64
    font_family = JetBrains Mono

    color = rgba(0a0a0aff)
    position = 0, 175

    halign = center
    valign = center
}

# Date label
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B %Y')"
    font_size = 22
    font_family = JetBrains Mono

    color = rgba(60DD2Aff)
    position = 0, 90

    halign = center
    valign = center
}